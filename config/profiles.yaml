# config/profiles.yaml — Model profile registry for PetriDishOfMadness
# Each profile defines an adapter + endpoint + model.
# Secrets are referenced by env-var name (api_key_env), never stored here.
# ${VAR:-default} interpolation is supported for base_url and model_id.
#
# W11b / EM-083 — optional per-profile DAY caps for the usage_alert channel:
#   rpd: <int>   # requests/day cap
#   tpd: <int>   # tokens/day cap (input+output)
# A profile is a provider lane (groq/cerebras/... upstreams), so caps live here.
# Crossing 70% of a cap emits ONE `usage_alert {provider, metric, pct, limit}`
# per profile/metric per UTC day (providers/usage.py). ALERTS ONLY — caps never
# throttle or block calls (world.usage_caps / EM-067 owns throttling). Omitting
# both keys = no caps = zero alerts (pre-W11b behavior). The values below are
# approximate published free-tier daily quotas; tune them to your accounts.

profiles:
  # ── FreeLLMAPI profiles (default; routed through OpenAI-compatible proxy) ──

  # Three CONFIRMED-WORKING models on the live proxy (verified HTTP 200).
  # The proxy may reroute requests; the actually-routed model is surfaced
  # at runtime via the X-Routed-Via response header (payload.routed_via).
  #
  # max_tokens is 1024 (not 512) because reroutes can land on REASONING
  # models (nemotron / gpt-oss / cogito observed) whose chain-of-thought
  # counts against the completion budget — at 512 they truncated
  # (finish_reason=length) before emitting any JSON and agents starved on
  # idle fallbacks. The runtime additionally retries length-truncated
  # parses at >=2048 tokens (agents/runtime.py _retry_max_tokens).

  - name: gemini-flash        # unique; referenced by agents + reassign API
    adapter: openai           # openai|anthropic|gemini|mock
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY      # env var holding the bearer token (NOT the literal key)
    model_id: gemini-3.5-flash
    max_tokens: 1024
    temperature: 0.8
    color: "#36c5a8"
    rpd: 1500                  # ~Gemini API free-tier daily request quota (flash)

  - name: qwen-next
    adapter: openai           # routed through FreeLLMAPI's OpenAI-compatible interface
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    # EM-323 (2026-07-13): `qwen/qwen3-next-80b-a3b-instruct:free` is not in the
    # FreeLLMAPI catalog (the OpenRouter-style id) — 404/exhausted. Corrected to
    # the plain catalogued id so the proxy can route it across any qwen provider.
    model_id: qwen3-next-80b
    max_tokens: 1024
    temperature: 0.8
    color: "#f5a623"
    rpd: 50                    # ~OpenRouter :free daily request quota (no credits)

  - name: deepseek-pro
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    # PR#106 C5 (2026-07-15): `deepseek-ai/deepseek-v4-pro` (the vendor-prefixed
    # id) is not in the FreeLLMAPI catalog — 404, burning a bounce attempt per
    # walk via the lanes.yaml `*` sweep. Corrected to the plain catalogued id
    # (verified live); same class as EM-321/EM-323 — catalog ids never carry a
    # `vendor/` prefix (the proxy resolves those internally).
    model_id: deepseek-v4-pro
    max_tokens: 1024
    temperature: 0.8
    color: "#a86bd6"

  # ── EM-090 (W10): four more lanes, chosen for PROVIDER diversity (groq /
  # cerebras / mistral / cloudflare upstreams) and LAB diversity (llama / glm /
  # mistral / kimi) so one exhausted free tier can't collapse the whole
  # model-vs-model experiment. All ids verified in the live proxy catalog.
  # NOTE: profiles load at backend startup — restart (./dev) to pick these up.

  - name: groq-llama
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: llama-3.3-70b-versatile
    max_tokens: 1024
    temperature: 0.8
    color: "#4a9eda"
    rpd: 1000                  # ~Groq free-tier daily quotas (llama-3.3-70b-versatile)
    tpd: 100000

  - name: cerebras-glm
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: zai-glm-4.7
    max_tokens: 1024
    temperature: 0.8
    color: "#e85d75"
    rpd: 14400                 # ~Cerebras free-tier daily quotas
    tpd: 1000000

  - name: mistral-small
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    # EM-321 (2026-07-13): `mistral-small-latest` is NOT in the FreeLLMAPI catalog
    # ("Model not in the catalog") — Vesper's pinned lane ALWAYS 404'd and fell to
    # the fallback, even with no rate storm. Corrected to a catalogued, has-key,
    # currently-live id (resolves to mistralai/mistral-small-4-119b-2603).
    model_id: mistral-small-4-119b
    max_tokens: 1024
    temperature: 0.8
    color: "#7bc950"

  - name: kimi
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    # EM-323 (2026-07-13): `@cf/moonshotai/kimi-k2.6` pins to the CLOUDFLARE-only
    # kimi upstream, which exhausts constantly (Mox's chronic fallback). The
    # plain catalogued id lets the proxy route kimi across any provider.
    model_id: kimi-k2.6
    max_tokens: 1024
    temperature: 0.8
    color: "#d4a017"

  # ── EM-323 (2026-07-13) — rich-voice additions. Verified live on the proxy:
  # mistral-large-3-675b returns clean, vivid, in-character prose (no CoT leak);
  # command-a-2 (Cohere Command A+) is a strong distinct voice. Added as profiles
  # (assignable to agents / reassign / A-B) AND wired into the config/lanes.yaml
  # bounce walk as high-priority fallbacks so a failed pin lands on a RICH model
  # (not the small gpt-oss:20b) during rate storms — the fix for flat storm chat.
  - name: mistral-large
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: mistral-large-3-675b
    max_tokens: 1024
    temperature: 0.85
    color: "#e0533d"

  # EM-324 (2026-07-13): command-a-2 resolves to cohere/command-a-plus-05-2026,
  # which — verified against run 1388 — emits a PLAINTEXT reasoning preamble on
  # strict-JSON agent turns and is output-capped at 1024 tokens, so it truncates
  # (finish_reason=length, no JSON) 32/32 times before emitting an action. It is
  # therefore DENYLISTED from the bounce walk via config/lanes.yaml
  # `adaptive_routing.exclude` (a plain order removal was not enough — the `*`
  # sweep re-placed it, PR#106 C15) and NOT a pin; the profile stays only so any
  # legacy reference still resolves. The Cohere *R* series (command-r, below) is
  # clean — only the *A+* series preambles.
  - name: command-a
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: command-a-2
    max_tokens: 1024
    temperature: 0.85
    color: "#9b59d0"

  # ── EM-324 (2026-07-13) — deliberate agent repin. The prior pins (gemini-flash
  # =gemini-3.5-flash, groq-llama=llama-3.3-70b-versatile, kimi=kimi-k2.6) all
  # point at chronically rate-limited native endpoints, so nearly every turn was
  # SILENTLY rerouted by the proxy — often onto the truncating command-a-plus
  # (Ada/Bram/Mox idled 10-16×/run). These three replacements were verified LIVE
  # (probe, mid rate-storm): each is currently REACHABLE and returns clean
  # strict-JSON (finish=stop), and they keep lab diversity (Google / Meta /
  # Cohere). Reachability shifts hourly, so the adaptive bounce loop + the EM-324
  # detour fix (a chronic length/no-JSON lane goes sick → routes around it) cover
  # a pin that later rate-limits.
  - name: gemini-flash-lite   # Ada — Google; the lite tier has real free headroom
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: gemini-3.1-flash-lite
    max_tokens: 1024
    temperature: 0.8
    color: "#3ddc84"
    rpd: 1500

  - name: llama-fast          # Bram — Meta; the fp8-fast endpoint, not groq's exhausted one
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: llama-3.3-70b-fp8-fast
    max_tokens: 1024
    temperature: 0.8
    color: "#5aa9e6"

  - name: command-r           # Cohere R series (clean JSON; NOT the A+ truncator) — bounce lane
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: command-r-2
    max_tokens: 1024
    temperature: 0.8
    color: "#d96fd0"

  # EM-324 follow-up — Mox's pin moved off command-r (Cohere native is heavily
  # rate-limited right now, so it reroutes almost every turn — onto gpt-oss-120b,
  # which CoT-truncates on the heavy agent prompt, recovering only via the retry
  # boost). minimax-m3 (MiniMax) has a currently-LIVE native + clean strict-JSON
  # (probe-verified finish=stop) and a distinct exotic voice — a 5th lab across
  # the cast (Google / Meta / MiniMax / Mistral / Cerebras).
  - name: minimax             # Mox — MiniMax; live native, clean JSON, distinct voice
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: minimax-m3
    max_tokens: 1024
    temperature: 0.85
    color: "#e8a13c"

  # ── Adaptive Lane Routing (2026-07-08) — bounce-only healthy lane ──
  # NOT pinned to any agent: it exists so the config/lanes.yaml sorting list's
  # top priority `gpt-oss-120b*` resolves to a REAL lane. The sorting list was
  # authored expecting this profile but it was never created, so the #1 bounce
  # target was a ghost and pinned-lane failures fell straight to idle fallback.
  # Verified on the live proxy 2026-07-08: HTTP 200, clean strict-JSON output
  # (finish=stop, no chain-of-thought truncation at 1024), and NOT rate-limited
  # while the OpenRouter/Groq free lanes were all 429. Instruct-clean here, so
  # intentionally NOT reasoning-tagged (a reasoning tag would make the bounce
  # loop skip it on strict-JSON agent turns — the #77/#78 lesson).
  - name: gpt-oss-120b
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: gpt-oss-120b
    max_tokens: 1024
    temperature: 0.8
    color: "#5b8def"

  # ── EM-205 — the proxy's own router model (the universal backup) ──
  # Agents keep their PINNED lane above for the model-vs-model experiment; on a
  # 429 / 5xx / timeout the Router retries the SAME call ONCE here, and
  # FreeLLMAPI health-routes it across its whole upstream pool in a single
  # request (it knows which providers are throttled in real time; we don't).
  # No client-side fan-out across pinned lanes — that AMPLIFIED rate-limit
  # storms. Also the Chronicle narrator lane (world.yaml narrator.model_profile:
  # auto) so the chronicle never hammers a single rpd-capped free tier
  # (qwen-next = 50 requests/day, which the 49-chapter backfill exhausted).

  - name: auto
    adapter: openai
    base_url: ${FREELLMAPI_BASE_URL:-http://localhost:3001/v1}
    api_key_env: FREELLMAPI_KEY
    model_id: auto            # FreeLLMAPI router: picks a healthy upstream per request
    max_tokens: 1024
    temperature: 0.8
    color: "#c8ff00"

  # ── EM-222 — the dedicated embedding lane ──
  # Relevance-scored memory retrieval embeds each event ONCE (cached in the
  # event_embeddings table) and the agent's query each turn, routed through this
  # fixed embedding model — NEVER the agent's chat lane. The Router resolves the
  # profile literally named `embed` at startup; absent ⇒ retrieval falls back to
  # blind recency. NOT decision-cached — embeddings ADD calls (north-star).

  - name: embed
    adapter: openai-compatible
    model_id: bge-m3            # gating resolved 2026-06-19; gemini-embedding-001 = 3072-dim alt
    base_url: http://localhost:3001/v1
    api_key_env: FREELLMAPI_KEY
    color: "#9b59b6"

  # ── Mock profile (no network; deterministic scripted responses) ──
  # Use this for offline development and the test suite.

  - name: mock
    adapter: mock
    color: "#888"

  # ── EM-167 — Ollama overflow lane (local; off-critical-path background) ──
  # The overflow target for `world.overflow_lane` (world.yaml): background/
  # supporting cadence-tier turns spill here OFF FreeLLMAPI as an off-critical-
  # path background lane (the animal-task pattern), moving ~40% of background
  # calls off the free proxy. Named literally `ollama` so the default
  # `overflow_lane.profile: ollama` resolves.
  #
  # INERT until BOTH (a) `world.overflow_lane.enabled: true` AND (b) Ollama is
  # actually reachable: with OLLAMA_API_KEY unset the profile's available() is
  # False, so the overflow router self-suppresses and never routes here (no
  # turn hard-fails if Ollama is down — it falls back to the home lane). To turn
  # it on: `ollama serve` (or set OLLAMA_BASE_URL), export OLLAMA_API_KEY=ollama,
  # and flip overflow_lane.enabled in world.yaml. Live-verify pends a running
  # Ollama (not reachable in CI).
  - name: ollama
    adapter: openai
    base_url: ${OLLAMA_BASE_URL:-http://localhost:11434/v1}
    api_key_env: OLLAMA_API_KEY   # set to any non-empty string for Ollama (e.g. "ollama")
    model_id: ${OLLAMA_MODEL:-llama3.2}
    max_tokens: 1024
    temperature: 0.8
    color: "#27ae60"
