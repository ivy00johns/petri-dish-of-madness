# config/world.yaml — World parameters and seed agents for PetriDishOfMadness
# Adjust pacing, economy, and death thresholds here.
# Seed agents: each must reference a profile name from profiles.yaml.

world:
  agent_count: 3                 # used if `agents:` not fully specified
  tick_interval_seconds: 3
  turns_per_day: 20
  energy_decay_per_turn: 4
  death_after_zero_turns: 5
  starting_energy: 100
  starting_credits: 10
  recharge_cost: 2
  recharge_amount: 30
  work_reward: 4
  forage_reward: 1
  steal_max: 8
  ubi_amount: 2
  memory_window: 12
  attack_energy_cost: 6

places:
  - { id: plaza,    name: Central Plaza, x: 500, y: 500, kind: social,     description: "Open square where everyone mingles." }
  - { id: market,   name: Market,        x: 750, y: 400, kind: work,       description: "Earn credits by working." }
  - { id: townhall, name: Town Hall,     x: 250, y: 350, kind: governance, description: "Propose and vote on rules." }
  - { id: commons,  name: The Commons,   x: 500, y: 750, kind: wild,       description: "Forage for scraps." }
  - { id: home,     name: Hearth,        x: 300, y: 650, kind: home,       description: "Rest and recharge." }

agents:                          # seed agents; profile must match a profiles[].name
  # All three start together in the plaza so they meet, greet, and converse from
  # the first round (chatter is the whole point), then wander off to work/govern.
  - { name: Ada,  personality: "Warm-hearted tinkerer who keeps the village fair and tidy; chatty and curious, greets everyone and loves swapping news in the plaza, gently calls out freeloaders but always lends a hand.", profile: gemini-flash, location: plaza }
  - { name: Bram, personality: "Charming market trader who loves a good deal and a good gossip; quick with a joke, always chatting someone up, and might pocket a coin if nobody is watching.", profile: qwen-next, location: plaza }
  - { name: Cleo, personality: "Earnest town organizer who talks ideas with anyone who'll listen; loves proposals, votes, and rallying neighbours for community projects; dreams of a fairer commons.", profile: deepseek-pro, location: plaza }
