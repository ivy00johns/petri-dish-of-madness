# config/lanes.yaml — Adaptive Lane Routing sorting list
# Spec: docs/superpowers/specs/2026-07-07-adaptive-lane-routing.md (§3.3).
#
# The ONE place you curate lane PREFERENCE. When adaptive_routing.enabled is
# true, a pinned lane's failure walks this list in priority order (top = tried
# first), skipping health-sick lanes, lanes whose output ceiling can't fit the
# request, and reasoning-tagged lanes on strict-JSON turns — up to max_attempts
# healthy lanes, each bounded by per_attempt_timeout_s, before the runtime's
# idle fallback.
#
# RESERVED BACKSTOP (W30) + CURATED TERMINAL FALLBACK (W31/EM-318): ONE lane is
# GUARANTEED the final attempt slot — the curated lanes above it get
# max_attempts-1 attempts and the last one is reserved for it, unless it is the
# pinned lane, was already tried, or has no built adapter. WHICH lane is
# `terminal_fallback` below (default `auto`, byte-identical to W30). Without the
# reservation, an intermittent rate window that 429s the top curated lanes
# (each still sub-threshold healthy) burned every attempt before the backstop
# was ever consulted — the documented last resort was unreachable. Worst case
# is max_attempts x per_attempt_timeout_s of wall clock, but 429s return fast,
# so the realistic cascade stays far below the old 86s doom loops.
#
# W31/EM-318 tried a DETERMINISTIC curated terminal (`gpt-oss-120b`) here;
# EM-319 REVERTED it to `auto` after a live storm proved every specific lane
# can be individually rate-limited while the blind pool still routes (see the
# `terminal_fallback` comment below). The MECHANISM (any profile may hold the
# reserved slot) remains available.
#
# DEFAULT enabled: false ⇒ byte-identical to today (pin → EM-205 `auto` backup).
# Flip enabled: true to adopt the ordered bounce loop. Config is captured in
# runs.config_json, so a run's routing order is pinned for fork/replay.

adaptive_routing:
  enabled: true                # go-live 2026-07-08 — ordered health-aware bounce loop
  max_attempts: 5              # EM-323: 4 curated healthy lanes + the RESERVED terminal
                               # (was 3+1; widened to keep llama/qwen after the two
                               #  new rich-voice lanes jumped to the top of `order`)
  per_attempt_timeout_s: 12    # per-lane wall-clock cap (no 86s doomed cascades)
  allow_paid: false            # $0-first: `free: false` lanes stay off unless true
  # W31/EM-318 — the curated terminal fallback: the reserved final-attempt lane.
  # 2026-07-13 HOTFIX (EM-319): reverted to `auto`. EM-318's premise ("`auto`
  # returns All models exhausted during a rate storm") is empirically FALSE —
  # live probes during a rate storm show `auto` reliably routes to a live model
  # (e.g. gpt-oss:20b) while EVERY specific-model lane (gemini/groq/qwen and the
  # gpt-oss-120b terminal itself) can be individually rate-limited and return
  # "All models exhausted". With a specific terminal, ~93% of turns idled →
  # agents stopped eating → starvation death spiral (tick ~3600). `auto` is the
  # only lane that survives a partial rate storm, so it stays the GUARANTEED
  # last attempt on SURVIVABILITY grounds. Exhaustion idles are VISIBLE in the
  # feed again (the EM-318 feed-silence filter was removed — fix-don't-hide);
  # they are rare now that EM-324's repin + detour fixed the root cause, and
  # when one does surface it is real signal, not noise to mask.
  terminal_fallback: auto

  # ── Dynamic discovery/refresh (spec P2, EM-300) ────────────────────────────
  # Makes the lane pool DATA-DRIVEN: poll the FreeLLMAPI proxy's /v1/models
  # catalog + detect direct-provider env keys so lanes appear as you provision
  # accounts (add a key to FreeLLMAPI, set GEMINI_API_KEY) and drop out when
  # disabled — no restart. A newly-available model joins via the `*` sweep
  # below at sweep priority; a configured lane the catalog reports unavailable
  # (no_key/disabled) is retired. Empirical (probe 2026-07-15): /v1/models
  # carries `available` + `unavailable_reason`, so availability is real, not
  # just configuration.
  #
  # DEFAULT enabled: false ⇒ BYTE-IDENTICAL: the static P1 registry (this file
  # matched against configured profiles), no polling, no synth lanes. Flip
  # enabled: true to adopt. Refresh also on demand via POST /api/lanes/refresh;
  # the live registry is visible at GET /api/lanes/registry.
  discovery:
    enabled: false             # master toggle (default OFF ⇒ static registry)
    every_turns: 40            # counter-based auto-refresh cadence (served turns)
    freellmapi_models: true    # poll /v1/models: retire unavailable, synth new
    direct_keys: true          # detect GEMINI/ANTHROPIC/OPENAI/OLLAMA env keys
    admin_quota: false         # also read admin /api/health quotaStates (needs
                               #  FREELLMAPI_ADMIN_* creds; enrichment only, P3
                               #  owns 429-cap tracking)
  #
  # Lanes come from this file matched against configured profiles (P1) UNION the
  # discovered catalog (P2, when discovery.enabled).
  #
  # priority order, best-headroom-first. matcher = source + model glob.
  # a glob `model: "*"` sweeps every remaining lane of that source.
  # matcher globs run against each lane's ACTUAL model_id (profiles.yaml), NOT
  # the profile name. Every specific entry below is verified to resolve:
  #   mistral-large-3-675b   -> profile mistral-large
  #   mistral-small-4-119b   -> profile mistral-small
  #   llama-3.3-70b-fp8-fast -> profile llama-fast       (EM-324)
  #   gemini-3.1-flash-lite  -> profile gemini-flash-lite (EM-324)
  #   minimax-m3             -> profile minimax          (EM-324)
  #   command-r-2            -> profile command-r        (EM-324)
  #   gpt-oss-120b*          -> profile gpt-oss-120b
  #
  # EM-324 (2026-07-13) — the bounce pool is the set of PROBE-VERIFIED clean
  # lanes (each returned finish=stop + valid JSON live, mid rate-storm).
  # `command-a-2` (=cohere/command-a-plus preambles + truncates 32/32 on strict-
  # JSON, run 1388) is DENYLISTED via `exclude` below — its profile survives in
  # profiles.yaml for legacy references, so without the denylist the `*` sweep
  # would re-place it (PR#106 C15). `*qwen3-next-80b*` (OpenRouter :free 50 rpd)
  # was dropped from the CURATED order but stays reachable via the `*` sweep as
  # a deliberate last-ditch free lane. Order is
  # by OBSERVED direct-clean reliability from live run 1389: the mistral/llama/
  # gemini/minimax instruct lanes serve finish=stop directly; `gpt-oss-120b` is
  # DEMOTED to just above the sweep — it is a REASONING model whose CoT truncates
  # (finish=length) on the heavy ~4900-token agent prompt (run 1389 caught what
  # the short-prompt probe missed), recoverable only via the retry boost, so it
  # is a last-resort clean lane, not a preferred one. The GUARANTEED last slot
  # stays `auto` (terminal_fallback, EM-319). A pin that later rate-limits trips
  # the EM-324 detour (chronic length/no-JSON → lane_sick) and walks THIS list.
  order:
    - { source: freellmapi, model: "mistral-large-3-675b",   free: true }  # mistral-large — premium rich voice (when up)
    - { source: freellmapi, model: "mistral-small-4-119b",   free: true }  # mistral-small — verified direct-clean (finish=stop)
    - { source: freellmapi, model: "llama-3.3-70b-fp8-fast", free: true }  # llama-fast — Meta/Cloudflare, verified direct-clean
    - { source: freellmapi, model: "gemini-3.1-flash-lite",  free: true }  # gemini-flash-lite — Google, verified direct-clean
    - { source: freellmapi, model: "minimax-m3",             free: true }  # minimax — MiniMax, clean JSON
    - { source: freellmapi, model: "command-r-2",            free: true }  # command-r — Cohere R (clean when its native is up)
    - { source: freellmapi, model: "gpt-oss-120b*",          free: true }  # gpt-oss-120b — DEMOTED: reasoning, CoT-truncates on heavy turns (recoverable)
    - { source: freellmapi, model: "*",                      free: true }  # remaining free lanes (sweep)
    - { source: freellmapi, model: "auto" }                                # blind proxy picker — low-priority resort
    - { source: anthropic,  model: "claude-sonnet-5",        free: false } # paid, opt-in, dead last

  # DENYLIST (PR#106 C15) — matchers (same source + model-glob shape as `order`)
  # for lanes NO entry may place, not even the `*` sweep. This is the mechanism
  # for barring a legacy-only profile from the bounce walk without deleting it.
  exclude:
    - { source: freellmapi, model: "command-a-2" }  # cohere A+ — preambles + truncates strict-JSON (EM-324, run 1388)
