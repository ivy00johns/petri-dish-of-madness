# docker/nginx.conf — Reverse proxy for the web container.
# Serves the built Vite frontend and proxies /api + /ws to the backend.

server {
    listen 8080;
    server_name _;

    # Serve the Vite build output.
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths → index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to backend service.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket stream to backend service.
    location /ws {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
